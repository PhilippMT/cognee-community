[project]
name = "cognee-community-pipeline-thought-graph"
version = "0.1.0"
description = "ADHD-optimized thought graph pipeline for cognee: orchestrates thought capture, connection discovery, graph enrichment, and surprise connection finding."
requires-python = ">=3.11,<=3.13"
dependencies = [
    "cognee>=0.5.2",
    "cognee-community-tasks-thought-graph>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
cognee-community-tasks-thought-graph = { workspace = true }
